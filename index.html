<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEPL — New England Polo League</title>
<meta name="description" content="New England Polo League — Club team polo. Register teams, manage schedules, track standings, coordinate game-day resources.">
<meta name="description" content="New England Polo League — Club team polo across New England.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0C1117;--surface:#151C25;--surface-alt:#1A2332;--border:#253040;--border-light:#2D3B4F;--text:#E8ECF1;--text-muted:#8896A8;--text-dim:#5A6A7E;--accent:#C4A25C;--accent-light:#D4B76C;--green:#4CAF6E;--red:#CF6056;--blue:#5B8DC9;--teal:#4CA89E;--orange:#D4903C}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
.serif{font-family:'Playfair Display',serif}
a{color:var(--accent);text-decoration:none}
.max-w{max-width:1120px;margin:0 auto;padding:0 24px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px}
.card-accent{border-color:rgba(196,162,92,0.3)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.flex{display:flex;align-items:center}.gap-6{gap:6px}.gap-8{gap:8px}.gap-12{gap:12px}.gap-16{gap:16px}
.between{justify-content:space-between}.center{text-align:center}.wrap{flex-wrap:wrap}
.mt-4{margin-top:4px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mt-24{margin-top:24px}.mt-28{margin-top:28px}
.mb-6{margin-bottom:6px}.mb-8{margin-bottom:8px}.mb-10{margin-bottom:10px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}.mb-20{margin-bottom:20px}.mb-24{margin-bottom:24px}.mb-32{margin-bottom:32px}
h1{font-family:'Playfair Display',serif;font-size:42px;font-weight:700;letter-spacing:-0.02em}
h2{font-family:'Playfair Display',serif;font-size:28px;font-weight:700}
h3{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--accent)}
h4{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--text)}
.stat-num{font-family:'Playfair Display',serif;font-size:36px;font-weight:700}
.stat-label{font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-top:4px}
label.field-label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px}
input,select,textarea{width:100%;padding:10px 14px;background:var(--surface-alt);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none}
input:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:60px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border:none;border-radius:6px;font-weight:600;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s}
.btn-primary{background:var(--accent);color:var(--bg)}.btn-primary:hover{background:var(--accent-light)}.btn-primary:disabled{opacity:0.4;cursor:not-allowed}
.btn-secondary{background:transparent;color:var(--accent);border:1px solid var(--accent)}.btn-secondary:hover{background:rgba(196,162,92,0.1)}
.btn-danger{background:transparent;color:var(--red);border:1px solid rgba(207,96,86,0.4)}
.btn-sm{padding:6px 14px;font-size:12px}.btn-xs{padding:4px 10px;font-size:11px}
.btn-icon{background:none;border:none;color:var(--text-dim);cursor:pointer;padding:4px;display:inline-flex}.btn-icon:hover{color:var(--text)}
.tag{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;letter-spacing:0.03em}
.tag-low{background:rgba(76,168,158,0.1);color:var(--teal)}.tag-med{background:rgba(91,141,201,0.1);color:var(--blue)}
.tag-arena{background:rgba(91,141,201,0.1);color:var(--blue)}.tag-outdoor{background:rgba(76,175,110,0.1);color:var(--green)}
.tag-outdoor-arena{background:rgba(212,144,60,0.12);color:var(--orange)}
.tag-indoor{background:rgba(91,141,201,0.1);color:var(--blue)}
.tag-win{background:rgba(76,175,110,0.12);color:var(--green)}.tag-loss{background:rgba(207,96,86,0.12);color:var(--red)}.tag-draw{background:rgba(137,150,168,0.12);color:var(--text-muted)}
.tag-mvp{background:rgba(196,162,92,0.15);color:var(--accent)}
header{border-bottom:1px solid var(--border);background:var(--surface)}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 0}
.logo-area{display:flex;align-items:center;gap:14px}
.logo-icon{color:var(--accent)}.logo-icon svg{width:28px;height:28px}
.logo-text{font-family:'Playfair Display',serif;font-size:22px;font-weight:700}
.logo-sub{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.12em;margin-top:-2px}
nav{display:flex;gap:2px;background:var(--surface-alt);border-radius:8px;padding:3px}
nav button{display:flex;align-items:center;gap:6px;padding:8px 12px;border:none;border-radius:6px;cursor:pointer;background:transparent;color:var(--text-muted);font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;transition:all 0.15s}
nav button.active{background:rgba(196,162,92,0.15);color:var(--accent)}
nav button:hover:not(.active){color:var(--text)}
nav button svg{width:16px;height:16px}
.league-table{width:100%;border-collapse:collapse;font-size:14px}
.league-table th{padding:12px 10px;text-align:center;font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;border-bottom:1px solid var(--border);font-weight:600}
.league-table th.left{text-align:left}
.league-table td{padding:10px;text-align:center;border-bottom:1px solid var(--border)}
.league-table td.left{text-align:left}
.league-table tr:nth-child(even){background:rgba(26,35,50,0.3)}
.league-table .rank{font-family:'Playfair Display',serif;font-size:16px;font-weight:700}
.league-table .pts-cell{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--accent)}
.game-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 18px;display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;cursor:pointer;transition:border-color 0.15s}
.game-card:hover{border-color:var(--border-light)}.game-card.has-result{border-left:3px solid var(--accent)}
.game-team{font-weight:600;font-size:14px}.game-club{font-size:11px;color:var(--text-dim)}
.game-venue{font-size:11px;color:var(--text-dim);margin-top:4px}.game-date{font-size:11px;color:var(--teal);margin-top:2px}
.game-score{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--accent)}.game-vs{font-size:12px;color:var(--text-dim);font-weight:600}
.game-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:100%;max-width:580px;padding:28px;position:relative;max-height:90vh;overflow-y:auto}
.modal-close{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--text-dim);cursor:pointer;padding:4px}.modal-close:hover{color:var(--text)}
.filter-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.pill{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--accent);border:1px solid var(--accent);font-family:'DM Sans',sans-serif;transition:all 0.15s}
.pill.active{background:rgba(196,162,92,0.15)}
.how-card{padding:16px;background:var(--surface-alt);border-radius:8px}
.how-title{font-weight:700;font-size:14px;margin-bottom:6px}.how-desc{font-size:13px;color:var(--text-muted);line-height:1.55}
.recent-result{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.recent-result:last-child{border-bottom:none}
.chukker-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.chukker-label{font-size:12px;color:var(--text-muted);min-width:70px}
.chukker-input{width:48px;text-align:center;padding:6px 4px}
.date-block{background:var(--surface-alt);border-radius:8px;padding:12px 16px;margin-bottom:12px;border-left:3px solid var(--teal)}
.date-block.weekend{border-left-color:var(--accent)}
.date-primary{font-weight:700;font-size:14px;color:var(--text)}.date-alt{font-size:12px;color:var(--text-dim);margin-top:2px}
.player-stat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.player-stat-row:last-child{border-bottom:none}
footer{border-top:1px solid var(--border);padding:24px;text-align:center;margin-top:40px}
footer .sub{font-size:12px;color:var(--text-dim)}
.empty{text-align:center;padding:60px 20px;color:var(--text-dim)}
.empty-icon{font-size:40px;margin-bottom:12px}.empty-title{font-size:16px}.empty-sub{font-size:13px;margin-top:4px}
.fade-in{animation:fadeIn 0.2s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.week-header{display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.week-label{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--accent)}
.week-month{font-size:13px;color:var(--text-muted)}
.contact-link{color:var(--teal);font-size:11px;cursor:pointer;text-decoration:underline}
.contact-link:hover{color:var(--accent)}

.logo-circle{width:44px;height:44px;border-radius:50%;background:var(--surface-alt);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden}
.logo-circle.sm{width:32px;height:32px;font-size:16px;border-width:1px}
.logo-picker{display:flex;flex-wrap:wrap;gap:6px;padding:8px;background:var(--surface-alt);border-radius:8px;margin-top:6px}
.logo-picker span{cursor:pointer;font-size:22px;padding:4px;border-radius:6px;transition:background 0.1s}
.logo-picker span:hover{background:var(--border)}
.logo-picker span.sel{background:rgba(196,162,92,0.25);outline:2px solid var(--accent)}
.sub-tabs{display:flex;gap:2px;background:var(--surface-alt);border-radius:8px;padding:3px;margin-bottom:24px}
.sub-tab{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;background:transparent;color:var(--text-muted);font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;transition:all 0.15s}
.sub-tab.active{background:rgba(196,162,92,0.15);color:var(--accent)}
.sub-tab:hover:not(.active){color:var(--text)}


.season-bar{background:var(--surface-alt);border:1px solid var(--border);border-radius:8px;padding:10px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.season-select{width:auto;padding:6px 12px;font-size:13px;font-weight:600;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--accent)}
.season-badge{font-size:11px;padding:3px 10px;border-radius:12px;font-weight:600}
.season-active{background:rgba(76,175,110,0.12);color:var(--green)}
.season-completed{background:rgba(137,150,168,0.12);color:var(--text-muted)}
.season-reg{background:rgba(196,162,92,0.15);color:var(--accent)}
.resource-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px}
.resource-slot{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.resource-slot:last-child{border-bottom:none}
.resource-filled{color:var(--green)}.resource-open{color:var(--text-dim)}
.resource-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
.rb-filled{background:rgba(76,175,110,0.1);color:var(--green)}.rb-open{background:rgba(90,106,126,0.1);color:var(--text-dim)}.rb-urgent{background:rgba(207,96,86,0.12);color:var(--red)}

.hero{position:relative;overflow:hidden;border-radius:12px;margin-bottom:32px;min-height:320px;display:flex;align-items:center;justify-content:center;text-align:center;padding:60px 32px}
.hero-bg{position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1591985666643-4ee764490083?w=1200&q=80') center/cover no-repeat;filter:brightness(0.35)}
.hero-content{position:relative;z-index:1;max-width:640px}
.hero h1{font-size:48px;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,0.5);margin-bottom:12px}
.hero p{color:rgba(255,255,255,0.85);font-size:17px;line-height:1.6;text-shadow:0 1px 6px rgba(0,0,0,0.4)}
.hero .btn{margin-top:24px;box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.uspa-link{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--teal);text-decoration:none;padding:1px 6px;border-radius:4px;background:rgba(76,168,158,0.08);transition:all 0.15s}
.uspa-link:hover{background:rgba(76,168,158,0.18);color:var(--accent)}
.season-tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;background:rgba(196,162,92,0.12);color:var(--accent);margin-left:6px}
.dup-btn{font-size:11px;padding:3px 8px;border-radius:4px;background:rgba(91,141,201,0.1);color:var(--blue);border:1px solid rgba(91,141,201,0.2);cursor:pointer;font-weight:600;font-family:'DM Sans',sans-serif}
.dup-btn:hover{background:rgba(91,141,201,0.2)}
@media(max-width:768px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}nav{flex-wrap:wrap}nav button span.nav-label{display:none}h1{font-size:28px}.header-inner{flex-direction:column;gap:12px}.game-card{grid-template-columns:1fr;text-align:center;gap:8px}}
</style>
</head>

function mkPlayers(names){return names.map(n=>{const[name,h]=n.split('|');return{name,handicap:h||'0'}});}

function buildPreResources(schedule) {
  const resources = {};
  let seed = 77;
  function rng(){seed=(seed*16807+0)%2147483647;return(seed-1)/2147483646;}
  const names = ['Bill Tompkins','Sarah Chen','Alyson Poor','Steve Rudolph','Mark Gillespie','Dan Keating','Pete Schultz','Sarah Collins','Jim Hannigan','Tom Richards','Meg Sullivan','Hannah Greene'];
  const horses = ['Thunder','Blaze','Captain','Luna','Shadow','Copper','Penny','Duke','Scout','Arrow'];
  schedule.forEach(week => {
    week.games.forEach(g => {
      const r = {gameId:g.id,slots:{}};
      // Pre-fill some resources for early games
      const mi = ['Jan','Feb','Mar','Apr','May','Jun'].indexOf(week.month.substring(0,3));
      const filled = mi >= 0 && mi < 4;
      RESOURCE_TYPES.forEach(rt => {
        if (rt.id === 'umpire') {
          r.slots[rt.id] = filled ? {filled:true,volunteer:names[Math.floor(rng()*names.length)],confirmed:true} : {filled:false};
        } else if (rt.id === 'timekeeper') {
          r.slots[rt.id] = filled ? {filled:true,volunteer:names[Math.floor(rng()*names.length)],confirmed:true} : {filled:false};
        } else if (rt.id === 'umpire-horse') {
          r.slots[rt.id] = filled ? {filled:true,volunteer:names[Math.floor(rng()*names.length)],horseName:horses[Math.floor(rng()*horses.length)],confirmed:true} : {filled:false};
        } else {
          r.slots[rt.id] = {filled:false};
        }
      });
      resources[g.id] = r;
    });
  });
  return resources;
}

// ── Pre-built schedule with specific dates ──
function buildPreSchedule(){
  const teams = TEAMS_SEED;
  const matchups = [];
  for(let i=0;i<teams.length;i++) for(let j=i+1;j<teams.length;j++){
    matchups.push({home:teams[i].id,away:teams[j].id});
    matchups.push({home:teams[j].id,away:teams[i].id});
  }
  // Deterministic shuffle with seed
  let seed=42;
  function rng(){seed=(seed*16807+0)%2147483647;return(seed-1)/2147483646;}
  for(let i=matchups.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[matchups[i],matchups[j]]=[matchups[j],matchups[i]];}

  // Date slots: Saturdays April-November 2027
  // No outdoor before May 15, no outdoor after Oct 15
  const saturdays=[];
  const d=new Date(2027,3,3); // Apr 3 2027 (Sat)
  while(d<=new Date(2027,10,29)){
    if(d.getDay()===6) saturdays.push(new Date(d));
    d.setDate(d.getDate()+1);
  }

  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function fmt(dt){return months[dt.getMonth()]+' '+dt.getDate()+', 2027'}
  function isOutdoorOk(dt){return dt>=new Date(2027,4,15)&&dt<=new Date(2027,9,15);}

  const gamesPerWeek=Math.min(5,Math.floor(teams.length/2));
  const schedule=[];
  let mIdx=0,wkNum=1;

  // Create venue map for home teams
  const tvMap={};teams.forEach(t=>{if(t.homeVenue)tvMap[t.id]=t.homeVenue});
  const arenaVs=['v-myopia','v-stagehill','v-giant','v-newport','v-kings'];
  const outdoorVs=VENUES_SEED.filter(v=>v.hasOutdoor).map(v=>v.id);
  const outdoorArenaVs=VENUES_SEED.filter(v=>v.hasOutdoorArena).map(v=>v.id);

  for(let si=0;si<saturdays.length&&mIdx<matchups.length;si++){
    const sat=saturdays[si];
    const sun=new Date(sat);sun.setDate(sun.getDate()+1);
    const outdoor=isOutdoorOk(sat);
    const weekGames=[];
    const used=new Set();
    let attempts=0;

    // Some weekends are "round-robin weekends" at one venue (2 days, 4+ games)
    const isRRWeekend = (wkNum%6===1)&&mIdx>5;
    const rrVenue = isRRWeekend ? (outdoor?outdoorVs[wkNum%outdoorVs.length]:arenaVs[wkNum%arenaVs.length]) : null;

    const maxGames = isRRWeekend ? Math.min(6, gamesPerWeek+2) : gamesPerWeek;

    for(let g=0;g<maxGames&&mIdx<matchups.length&&attempts<matchups.length*2;){
      const m=matchups[mIdx];
      if(!used.has(m.home)&&!used.has(m.away)){
        let vid = isRRWeekend ? rrVenue : (tvMap[m.home]||null);
        if(!outdoor&&vid){
          const vobj=VENUES_SEED.find(v=>v.id===vid);
          if(vobj&&!vobj.hasArena&&!vobj.hasOutdoorArena){vid=arenaVs[g%arenaVs.length]}
        }
        if(!vid){const pool=outdoor?outdoorVs:arenaVs;vid=pool[g%pool.length]}
        const format=outdoor?(VENUES_SEED.find(v=>v.id===vid)?.hasOutdoorArena?'outdoor-arena':'outdoor'):'arena';
        const day=(g>=maxGames/2&&isRRWeekend)?sun:sat;
        const altDate=new Date(sat);altDate.setDate(altDate.getDate()+7);
        const times=['10:00 AM','11:30 AM','1:00 PM','2:30 PM','4:00 PM'];

        weekGames.push({
          id:'g-'+wkNum+'-'+g,home:m.home,away:m.away,venue:vid,
          date:fmt(day),altDate:fmt(altDate),
          time:times[g%times.length],format,
          week:wkNum,month:months[sat.getMonth()],
          isRRWeekend,
        });
        used.add(m.home);used.add(m.away);
        mIdx++;g++;attempts=0;
      } else {
        matchups.push(matchups.splice(mIdx,1)[0]);
        attempts++;
        if(mIdx>=matchups.length)break;
      }
    }
    if(weekGames.length>0){
      schedule.push({week:wkNum,month:months[sat.getMonth()],date:fmt(sat),indoor:!outdoor,games:weekGames,isRRWeekend});
      wkNum++;
    }
  }
  return schedule;
}

// ── Pre-populate results through June ──
function buildPreResults(schedule){
  const results={};
  const cutoff=new Date(2027,6,1); // July 1
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let seed=123;
  function rng(){seed=(seed*16807+0)%2147483647;return(seed-1)/2147483646;}
  function ri(min,max){return Math.floor(rng()*(max-min+1))+min;}

  // All player names across all teams for MVP selection
  const allPlayers={};
  TEAMS_SEED.forEach(t=>{
    t.players.forEach(p=>{allPlayers[t.id]=allPlayers[t.id]||[];allPlayers[t.id].push(p.name)});
    if(t.alternates)t.alternates.forEach(a=>{if(a.name)allPlayers[t.id].push(a.name)});
  });

  schedule.forEach(week=>{
    // Parse date
    const parts=week.date.split(' ');
    const mi=months.indexOf(parts[0]);
    const di=parseInt(parts[1]);
    const gDate=new Date(2027,mi,di);
    if(gDate>=cutoff)return;

    week.games.forEach(g=>{
      const hs=ri(2,8),as=ri(1,7);
      const winner=hs>=as?g.home:g.away;
      const winPlayers=allPlayers[winner]||['Unknown'];
      const mvp=winPlayers[ri(0,winPlayers.length-1)];
      // Generate chukker scores that roughly add up
      const chukkers=[];
      let hrem=hs,arem=as;
      for(let c=0;c<4;c++){
        const ch=c<3?ri(0,Math.min(3,hrem)):hrem;
        const ca=c<3?ri(0,Math.min(3,arem)):arem;
        chukkers.push({h:ch,a:ca});
        hrem-=ch;arem-=ca;
      }
      // Goal scorers
      const homePlayers=allPlayers[g.home]||[];
      const awayPlayers=allPlayers[g.away]||[];
      const homeScorers={},awayScorers={};
      let hg=hs,ag=as;
      while(hg>0){const p=homePlayers[ri(0,homePlayers.length-1)];homeScorers[p]=(homeScorers[p]||0)+1;hg--;}
      while(ag>0){const p=awayPlayers[ri(0,awayPlayers.length-1)];awayScorers[p]=(awayScorers[p]||0)+1;ag--;}

      results[g.id]={
        home:g.home,away:g.away,
        homeScore:hs,awayScore:as,
        chukkers,mvp,
        homeScorers,awayScorers,
        notes:'',timestamp:gDate.toISOString()
      };
    });
  });
  return results;
}

// ── Standings ──
function calcStandings(){
  const stats={};
  state.teams.forEach(t=>{stats[t.id]={id:t.id,name:t.name,club:t.club,goalLevel:t.goalLevel,w:0,l:0,d:0,pts:0,gf:0,ga:0,played:0,form:[]}});
  state.schedule.forEach(week=>{
    week.games.forEach(game=>{
      const r=state.results[game.id];
      if(!r||!stats[r.home]||!stats[r.away])return;
      stats[r.home].gf+=r.homeScore;stats[r.home].ga+=r.awayScore;
      stats[r.away].gf+=r.awayScore;stats[r.away].ga+=r.homeScore;
      stats[r.home].played++;stats[r.away].played++;
      if(r.homeScore>r.awayScore){stats[r.home].w++;stats[r.home].pts+=3;stats[r.away].l++;stats[r.home].form.push('W');stats[r.away].form.push('L')}
      else if(r.awayScore>r.homeScore){stats[r.away].w++;stats[r.away].pts+=3;stats[r.home].l++;stats[r.away].form.push('W');stats[r.home].form.push('L')}
      else{stats[r.home].d++;stats[r.away].d++;stats[r.home].pts+=1;stats[r.away].pts+=1;stats[r.home].form.push('D');stats[r.away].form.push('D')}
    });
  });
  return Object.values(stats).sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf);
}

// ── Player Stats ──
function calcPlayerStats(){
  const ps={};
  Object.values(state.results).forEach(r=>{
    if(r.homeScorers)Object.entries(r.homeScorers).forEach(([name,goals])=>{
      if(!ps[name])ps[name]={name,goals:0,mvps:0,games:0,teams:new Set()};
      ps[name].goals+=goals;ps[name].games++;ps[name].teams.add(r.home);
    });
    if(r.awayScorers)Object.entries(r.awayScorers).forEach(([name,goals])=>{
      if(!ps[name])ps[name]={name,goals:0,mvps:0,games:0,teams:new Set()};
      ps[name].goals+=goals;ps[name].games++;ps[name].teams.add(r.away);
    });
    if(r.mvp){if(!ps[r.mvp])ps[r.mvp]={name:r.mvp,goals:0,mvps:0,games:0,teams:new Set()};ps[r.mvp].mvps++;}
  });
  return Object.values(ps).map(p=>({...p,teams:[...p.teams]}));
}

function submitTeam(){const f=state.teamForm;if(!f.name||!f.club||!f.p1||!f.p2||!f.p3){alert('Fill in team name, club, and 3 players.');return}state.teams.push({id:'team-'+Date.now(),name:f.name,club:f.club,goalLevel:f.goalLevel,homeVenue:f.homeVenue,logo:f.logo||'🏇',season:state.currentSeason,players:[{name:f.p1,handicap:f.p1h},{name:f.p2,handicap:f.p2h},{name:f.p3,handicap:f.p3h}].filter(p=>p.name),alternates:[{name:f.a1,handicap:f.a1h},{name:f.a2,handicap:f.a2h}].filter(a=>a.name)});state.teamForm=freshTeamForm();state.showTeamForm=false;save();render();}

function duplicateTeam(tid){
  var t=state.teams.find(function(x){return x.id===tid});
  if(!t)return;
  // Build a list of other seasons
  var others=state.seasons.filter(function(s){return s.id!==t.season});
  if(others.length===0){alert('No other seasons available. Create a new season first.');return;}
  // Show picker
  state._dupTeamId=tid;
  state._dupModal=true;
  render();
}
function closeDupModal(){state._dupModal=false;state._dupTeamId=null;render();}
function confirmDup(seasonId){
  var t=state.teams.find(function(x){return x.id===state._dupTeamId});
  if(!t)return;
  var newT=JSON.parse(JSON.stringify(t));
  newT.id='team-'+Date.now();
  newT.season=seasonId;
  state.teams.push(newT);
  state._dupModal=false;state._dupTeamId=null;
  save();render();
}
function renderDupModal(){
  var t=state.teams.find(function(x){return x.id===state._dupTeamId});
  if(!t)return'';
  return '<div class="modal-overlay" onclick="if(event.target===this)closeDupModal()"><div class="modal fade-in" style="max-width:420px">'+
    '<button class="modal-close" onclick="closeDupModal()">'+icon('x',20)+'</button>'+
    '<h3 style="margin-bottom:8px">Copy Team to Season</h3>'+
    '<p style="font-size:13px;color:var(--text-muted);margin-bottom:20px">Duplicate <strong>'+esc(t.name)+'</strong> to another season. You can then edit the copy to update handicaps or roster.</p>'+
    state.seasons.filter(function(s){return s.id!==t.season}).map(function(s){
      return '<div style="padding:12px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:border-color 0.15s" onmouseover="this.style.borderColor=\'var(--accent)\'" onmouseout="this.style.borderColor=\'var(--border)\'" onclick="confirmDup(&apos;'+s.id+'&apos;)">'+
        '<div><div style="font-weight:600">'+esc(s.name)+'</div><div style="font-size:12px;color:var(--text-dim)">'+s.status+'</div></div>'+
        '<span style="color:var(--accent);font-weight:600;font-size:13px">Select &rarr;</span></div>';
    }).join('')+
    '<div style="margin-top:12px;text-align:right"><button class="btn btn-secondary btn-sm" onclick="closeDupModal()">Cancel</button></div>'+
  '</div></div>';
}
function removeTeam(id){if(confirm('Remove this team?')){state.teams=state.teams.filter(t=>t.id!==id);save();render();}}

// ═══ SCHEDULE ═══
function renderSchedule(tm,vm){
  const months=[...new Set(state.schedule.map(w=>w.month))];
  const filtered=state.filterMonth==='all'?state.schedule:state.schedule.filter(w=>w.month===state.filterMonth);
  const total=state.schedule.reduce((s,w)=>s+w.games.length,0);
  return`
    <div class="flex between mb-24"><div><h2>Season Schedule</h2><p style="color:var(--text-muted);font-size:14px" class="mt-4">${state.schedule.length} weeks, ${total} matches &middot; April – November 2027 (Outdoor: May 15 – Oct 15)</p></div>
      <button class="btn btn-primary" onclick="doGenerate()" ${state.teams.length<2||state.venues.length<1?'disabled':''}>${icon('refresh')} Regenerate</button></div>
    ${state.schedule.length>0?`
      <div class="filter-pills"><button class="pill ${state.filterMonth==='all'?'active':''}" onclick="setState({filterMonth:'all'})">All</button>${months.map(m=>`<button class="pill ${state.filterMonth===m?'active':''}" onclick="setState({filterMonth:'${m}'})">${m}</button>`).join('')}</div>
      ${filtered.map(week=>`<div class="mb-20 fade-in">
        <div class="week-header"><span class="week-label">Week ${week.week}</span><span class="week-month">${week.date}</span>${week.indoor?'<span class="tag tag-indoor">Indoor</span>':'<span class="tag tag-outdoor">Outdoor</span>'}${week.isRRWeekend?'<span class="tag tag-mvp">Round Robin Weekend</span>':''}</div>
        <div style="display:grid;gap:8px">${week.games.map(g=>{
          const ht=tm[g.home],at=tm[g.away],v=vm[g.venue],r=state.results[g.id];
          return`<div class="game-card ${r?'has-result':''}" onclick="openGameModal('${g.id}')">
            <div style="text-align:right"><div class="game-team">${ht?esc(ht.name):'?'}</div><div class="game-club">${ht?esc(ht.club):''}</div></div>
            <div class="center">${r?`<div class="game-score">${r.homeScore} – ${r.awayScore}</div>`:`<div class="game-vs">vs</div>`}
              <div class="game-date">${icon('clock',11)} ${g.time||'TBD'} &middot; ${g.date}</div>
              <div class="game-venue">@ ${v?esc(v.name):'TBD'} ${formatTag(g.format)}</div>
              ${g.altDate?`<div style="font-size:10px;color:var(--text-dim);margin-top:2px">Alt: ${g.altDate}</div>`:''}
            </div>
            <div><div class="game-team">${at?esc(at.name):'?'}</div><div class="game-club">${at?esc(at.club):''}</div></div>
          </div>`}).join('')}</div>
      </div>`).join('')}
    `:`<div class="card card-accent center" style="padding:40px"><div style="color:var(--text-muted)">Register teams and venues, then generate.</div></div>`}
  `;
}
function doGenerate(){if(state.schedule.length>0&&!confirm('Regenerate? This clears results.'))return;const teams=state.teams;const matchups=[];for(let i=0;i<teams.length;i++)for(let j=i+1;j<teams.length;j++){matchups.push({home:teams[i].id,away:teams[j].id});matchups.push({home:teams[j].id,away:teams[i].id})}for(let i=matchups.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[matchups[i],matchups[j]]=[matchups[j],matchups[i]]}state.schedule=buildPreSchedule();state.results={};save();render();}

// ═══ RESULTS ═══
function renderResults(tm,vm){
  const withR=[],withoutR=[];
  state.schedule.forEach(w=>{w.games.forEach(g=>{const o={...g,weekNum:w.week};if(state.results[g.id])withR.push(o);else withoutR.push(o)})});
  return `
    <div class="flex between mb-24"><div><h2>Enter Results</h2><p style="color:var(--text-muted);font-size:14px" class="mt-4">${withR.length} of ${withR.length+withoutR.length} completed. Click any game to enter scores, MVP, and goal scorers.</p></div></div>
    ${state.schedule.length===0?`<div class="card center" style="padding:40px;color:var(--text-muted)">Generate a schedule first.</div>`:''}
    ${withoutR.length>0?`<h3 class="mb-12">Upcoming</h3><div style="display:grid;gap:8px" class="mb-32">${withoutR.slice(0,15).map(g=>{const ht=tm[g.home],at=tm[g.away],v=vm[g.venue];return`<div class="game-card" onclick="openGameModal('${g.id}')"><div style="text-align:right"><div class="game-team">${ht?esc(ht.name):'?'}</div><div class="game-club">${ht?esc(ht.club):''}</div></div><div class="center"><div class="game-vs">vs</div><div class="game-date">${g.date} &middot; ${g.time||'TBD'}</div><div class="game-venue">@ ${v?esc(v.name):'TBD'}</div></div><div><div class="game-team">${at?esc(at.name):'?'}</div><div class="game-club">${at?esc(at.club):''}</div></div></div>`}).join('')}${withoutR.length>15?`<div class="center" style="padding:10px;color:var(--text-dim);font-size:13px">+ ${withoutR.length-15} more</div>`:''}</div>`:''}
    ${withR.length>0?`<h3 class="mb-12">Completed (${withR.length})</h3><div style="display:grid;gap:8px">${withR.map(g=>{const ht=tm[g.home],at=tm[g.away],v=vm[g.venue],r=state.results[g.id];return`<div class="game-card has-result" onclick="openGameModal('${g.id}')"><div style="text-align:right"><div class="game-team">${ht?esc(ht.name):'?'}</div><div class="game-club">${ht?esc(ht.club):''}</div></div><div class="center"><div class="game-score">${r.homeScore} – ${r.awayScore}</div><div class="game-date">${g.date}</div>${r.mvp?`<div style="margin-top:4px"><span class="tag tag-mvp">${icon('star',10)} MVP: ${esc(r.mvp)}</span></div>`:''}</div><div><div class="game-team">${at?esc(at.name):'?'}</div><div class="game-club">${at?esc(at.club):''}</div></div></div>`}).join('')}</div>`:''}
  `;
}

// ═══ GAME MODAL ═══
function openGameModal(id){state.gameModal=id;render();}
function closeGameModal(){state.gameModal=null;render();}
function openEditGame(id){state.editGameModal=id;render();}
function closeEditGame(){state.editGameModal=null;render();}

function renderGameModal(tm,vm){
  let game=null,weekData=null;
  for(const w of state.schedule){const f=w.games.find(g=>g.id===state.gameModal);if(f){game=f;weekData=w;break;}}
  if(!game)return'';
  const ht=tm[game.home],at=tm[game.away],v=vm[game.venue];
  const r=state.results[game.id]||{homeScore:'',awayScore:'',chukkers:[],notes:'',mvp:'',homeScorers:{},awayScorers:{}};
  const allPlayers=[];
  if(ht)ht.players.forEach(p=>allPlayers.push(p.name));
  if(ht&&ht.alternates)ht.alternates.filter(a=>a.name).forEach(a=>allPlayers.push(a.name));
  if(at)at.players.forEach(p=>allPlayers.push(p.name));
  if(at&&at.alternates)at.alternates.filter(a=>a.name).forEach(a=>allPlayers.push(a.name));

  return`<div class="modal-overlay" onclick="if(event.target===this)closeGameModal()"><div class="modal fade-in">
    <button class="modal-close" onclick="closeGameModal()">${icon('x',20)}</button>
    <div class="center mb-16">
      <div style="font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em">Week ${weekData.week} &middot; ${game.date} &middot; ${game.time||'TBD'}</div>
      ${v?`<div style="font-size:13px;color:var(--text-dim);margin-top:4px">@ ${esc(v.name)}, ${esc(v.location)} ${v.st} ${formatTag(game.format)}</div>`:''}
      ${v&&v.contact?`<a href="mailto:${esc(v.contact)}" class="contact-link">${icon('mail',11)} Contact venue</a>`:''}
      ${v&&v.organizer?`<span style="font-size:11px;color:var(--text-dim);margin-left:8px">${icon('users',11)} ${esc(v.organizer)}</span>`:''}
      ${game.altDate?`<div style="font-size:11px;color:var(--text-dim);margin-top:4px">Alternate date: ${game.altDate}</div>`:''}
      <div style="margin-top:6px"><button class="btn btn-secondary btn-xs" onclick="closeGameModal();openEditGame('${game.id}')">${icon('edit',12)} Edit Time/Date</button></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center;margin-bottom:20px">
      <div class="center"><div class="serif" style="font-size:20px;font-weight:700">${ht?esc(ht.name):'?'}</div><div style="font-size:12px;color:var(--text-muted);margin-top:2px">${ht?esc(ht.club):''}</div>${ht?`<div style="margin-top:8px;font-size:12px;color:var(--text-dim)">${ht.players.map(p=>esc(p.name)).join('<br>')}</div>`:''}</div>
      <div class="center"><div style="font-size:12px;color:var(--text-dim);margin-bottom:8px">FINAL SCORE</div><div class="flex gap-8" style="justify-content:center">
        <input type="number" min="0" max="99" class="score-input" id="m-hs" value="${r.homeScore}" placeholder="–" style="font-size:28px;width:60px;padding:10px 6px">
        <span style="color:var(--text-dim);font-size:24px;font-weight:700">–</span>
        <input type="number" min="0" max="99" class="score-input" id="m-as" value="${r.awayScore}" placeholder="–" style="font-size:28px;width:60px;padding:10px 6px">
      </div></div>
      <div class="center"><div class="serif" style="font-size:20px;font-weight:700">${at?esc(at.name):'?'}</div><div style="font-size:12px;color:var(--text-muted);margin-top:2px">${at?esc(at.club):''}</div>${at?`<div style="margin-top:8px;font-size:12px;color:var(--text-dim)">${at.players.map(p=>esc(p.name)).join('<br>')}</div>`:''}</div>
    </div>
    <div class="mb-16"><label class="field-label">${icon('star',12)} Game MVP</label>
      <select id="m-mvp"><option value="">Select MVP...</option>${allPlayers.map(p=>`<option value="${esc(p)}" ${r.mvp===p?'selected':''}>${esc(p)}</option>`).join('')}</select>
    </div>
    <div class="grid-2 mb-16">
      <div><label class="field-label">${ht?esc(ht.name):''} Goal Scorers</label>${(ht?ht.players:[]).concat((ht&&ht.alternates)||[]).filter(p=>p.name).map(p=>`<div class="flex between" style="margin-bottom:6px"><span style="font-size:13px">${esc(p.name)}</span><input type="number" min="0" max="20" style="width:50px;text-align:center;padding:4px" class="hscorer" data-name="${esc(p.name)}" value="${r.homeScorers&&r.homeScorers[p.name]||''}"></div>`).join('')}</div>
      <div><label class="field-label">${at?esc(at.name):''} Goal Scorers</label>${(at?at.players:[]).concat((at&&at.alternates)||[]).filter(p=>p.name).map(p=>`<div class="flex between" style="margin-bottom:6px"><span style="font-size:13px">${esc(p.name)}</span><input type="number" min="0" max="20" style="width:50px;text-align:center;padding:4px" class="ascorer" data-name="${esc(p.name)}" value="${r.awayScorers&&r.awayScorers[p.name]||''}"></div>`).join('')}</div>
    </div>
    <div class="mb-16"><label class="field-label">Chukker Scores (optional)</label>${[1,2,3,4].map(c=>{const ck=(r.chukkers&&r.chukkers[c-1])||{h:'',a:''};return`<div class="chukker-row"><span class="chukker-label">Chukker ${c}</span><input type="number" min="0" max="20" class="chukker-input" id="ck-h-${c}" value="${ck.h}" placeholder="H"><span style="color:var(--text-dim)">–</span><input type="number" min="0" max="20" class="chukker-input" id="ck-a-${c}" value="${ck.a}" placeholder="A"></div>`}).join('')}</div>
    <div class="mb-20"><label class="field-label">Game Notes</label><textarea id="m-notes" placeholder="Weather, notable plays, injuries...">${esc(r.notes||'')}</textarea></div>
    <div class="flex gap-8"><button class="btn btn-primary" onclick="saveGame('${game.id}','${game.home}','${game.away}')">${icon('check')} Save Result</button>
      ${state.results[game.id]?`<button class="btn btn-danger btn-sm" onclick="clearGame('${game.id}')">Clear</button>`:''}
      <button class="btn btn-secondary" onclick="closeGameModal()">Cancel</button></div>
  </div></div>`;
}

function saveGame(gid,hid,aid){
  const hs=document.getElementById('m-hs').value,as=document.getElementById('m-as').value;
  if(hs===''||as===''){alert('Enter both scores.');return}
  const chukkers=[1,2,3,4].map(c=>({h:document.getElementById('ck-h-'+c).value,a:document.getElementById('ck-a-'+c).value})).filter(c=>c.h!==''||c.a!=='');
  const mvp=document.getElementById('m-mvp').value;
  const notes=document.getElementById('m-notes').value;
  const homeScorers={},awayScorers={};
  document.querySelectorAll('.hscorer').forEach(el=>{const v=parseInt(el.value);if(v>0)homeScorers[el.dataset.name]=v;});
  document.querySelectorAll('.ascorer').forEach(el=>{const v=parseInt(el.value);if(v>0)awayScorers[el.dataset.name]=v;});
  state.results[gid]={home:hid,away:aid,homeScore:parseInt(hs),awayScore:parseInt(as),chukkers,mvp,homeScorers,awayScorers,notes,timestamp:new Date().toISOString()};
  state.gameModal=null;save();render();
}
function clearGame(gid){if(confirm('Clear this result?')){delete state.results[gid];state.gameModal=null;save();render();}}

function saveEditGame(gid){
  for(const w of state.schedule){const g=w.games.find(g=>g.id===gid);if(g){g.time=document.getElementById('eg-time').value;g.date=document.getElementById('eg-date').value;g.altDate=document.getElementById('eg-alt').value;g.venue=document.getElementById('eg-venue').value;break;}}
  state.editGameModal=null;save();render();
}

// ═══ STANDINGS ═══
function renderStandings(tm){
  const standings=calcStandings();
  if(!standings.length)return`<div class="empty"><div class="empty-title">No teams yet</div></div>`;
  return`
    <div class="mb-24"><h2>League Standings</h2><p style="color:var(--text-muted);font-size:14px" class="mt-4">Win = 3 pts &middot; Draw = 1 pt &middot; Loss = 0 pts</p></div>
    <div class="card" style="padding:0;overflow:hidden;overflow-x:auto"><table class="league-table"><thead><tr>
      <th style="width:40px">#</th><th class="left">Team</th><th class="left">Club</th><th>Div</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th><th>Form</th>
    </tr></thead><tbody>${standings.map((s,i)=>`<tr>
      <td><span class="rank" style="color:${i===0&&s.pts>0?'var(--accent)':'var(--text-muted)'}">${i+1}</span></td>
      <td class="left" style="font-weight:600">${esc(s.name)}</td><td class="left" style="color:var(--text-muted)">${esc(s.club)}</td>
      <td><span class="tag ${s.goalLevel==='low'?'tag-low':'tag-med'}" style="font-size:10px">${s.goalLevel==='low'?'Low':'Med'}</span></td>
      <td>${s.played}</td><td style="color:var(--green)">${s.w}</td><td style="color:var(--text-muted)">${s.d}</td><td style="color:var(--red)">${s.l}</td>
      <td>${s.gf}</td><td>${s.ga}</td>
      <td style="color:${s.gf-s.ga>0?'var(--green)':s.gf-s.ga<0?'var(--red)':'var(--text-muted)'}">${s.gf-s.ga>0?'+':''}${s.gf-s.ga}</td>
      <td class="pts-cell">${s.pts}</td>
      <td>${s.form.slice(-5).map(f=>`<span class="tag ${f==='W'?'tag-win':f==='L'?'tag-loss':'tag-draw'}" style="font-size:10px;padding:2px 6px;margin:0 1px">${f}</span>`).join('')}</td>
    </tr>`).join('')}</tbody></table></div>
  `;
}

// ═══ STATS (team + player) ═══
function renderPlayerStats(tm){
  const standings=calcStandings();
  const ps=calcPlayerStats();
  const tmm=tmMap();
  function teamName(ids){return ids.map(function(id){return tmm[id]?tmm[id].name:'?';}).join(', ');}

  return `
    <div class="flex between mb-16"><h2>Statistics</h2></div>
    <div class="sub-tabs">
      <button class="sub-tab ${state.statsSubTab==='team'?'active':''}" onclick="setState({statsSubTab:'team'})">Team Stats</button>
      <button class="sub-tab ${state.statsSubTab==='player'?'active':''}" onclick="setState({statsSubTab:'player'})">Player Stats</button>
    </div>
    ${state.statsSubTab==='team'?renderTeamStats(standings,tmm):renderIndividualStats(ps,tmm)}
  `;
}

function renderTeamStats(standings,tmm){
  const vm=vmMap();
  return `
    <div class="grid-2 mb-24">${standings.map(function(s){
      const t=tmm[s.id];const v=t&&t.homeVenue?vm[t.homeVenue]:null;
      const winPct=s.played>0?((s.w/s.played)*100).toFixed(0):'0';
      const ppg=s.played>0?(s.gf/s.played).toFixed(1):'0.0';
      const capg=s.played>0?(s.ga/s.played).toFixed(1):'0.0';
      return '<div class="card team-stat-card"><div class="flex gap-12 mb-12">'+logoCircle(t?t.logo:null,'sm')+'<div><div class="serif" style="font-size:16px;font-weight:700">'+esc(s.name)+'</div><div style="font-size:11px;color:var(--text-dim)">'+esc(s.club)+(v?' &middot; '+esc(v.name):'')+'</div></div><span class="tag '+(s.goalLevel==='low'?'tag-low':'tag-med')+'" style="margin-left:auto">'+( s.goalLevel==='low'?'Low':'Med')+'</span></div>'+
        '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px">'+
        '<div class="center"><div style="font-family:\'Playfair Display\',serif;font-size:20px;font-weight:700;color:var(--accent)">'+s.pts+'</div><div style="font-size:10px;color:var(--text-dim);text-transform:uppercase">Points</div></div>'+
        '<div class="center"><div style="font-size:18px;font-weight:700;color:var(--green)">'+winPct+'%</div><div style="font-size:10px;color:var(--text-dim);text-transform:uppercase">Win Rate</div></div>'+
        '<div class="center"><div style="font-size:18px;font-weight:700;color:var(--teal)">'+ppg+'</div><div style="font-size:10px;color:var(--text-dim);text-transform:uppercase">Goals/Game</div></div>'+
        '<div class="center"><div style="font-size:18px;font-weight:700;color:var(--blue)">'+capg+'</div><div style="font-size:10px;color:var(--text-dim);text-transform:uppercase">Conc/Game</div></div></div>'+
        '<div style="font-size:12px;color:var(--text-muted)">'+s.w+'W '+s.d+'D '+s.l+'L &middot; '+s.gf+' GF '+s.ga+' GA &middot; GD '+(s.gf-s.ga>0?'+':'')+(s.gf-s.ga)+'</div>'+
        '<div style="margin-top:8px">'+s.form.slice(-8).map(function(f){return '<span class="tag '+(f==='W'?'tag-win':f==='L'?'tag-loss':'tag-draw')+'" style="font-size:10px;padding:2px 6px;margin:0 1px">'+f+'</span>';}).join('')+'</div></div>';
    }).join('')}</div>
  `;
}

function renderIndividualStats(ps,tmm){
  function teamName(ids){return ids.map(function(id){return tmm[id]?tmm[id].name:'?';}).join(', ');}
  const byGoals=ps.slice().sort(function(a,b){return b.goals-a.goals;});
  const byMVP=ps.filter(function(p){return p.mvps>0;}).sort(function(a,b){return b.mvps-a.mvps;});
  const byGPG=ps.filter(function(p){return p.games>=3;}).sort(function(a,b){return(b.goals/b.games)-(a.goals/a.games);});
  return `
    <div class="grid-2 mb-24">
      <div class="card"><h3 class="mb-12">Top Scorers</h3>
        <div style="display:grid;grid-template-columns:30px 1fr auto;gap:4px 12px;font-size:13px;align-items:center">
          ${byGoals.slice(0,15).map(function(p,i){return '<span style="color:'+(i<3?'var(--accent)':'var(--text-muted)')+';font-weight:700;text-align:center;font-family:\'Playfair Display\',serif">'+(i+1)+'</span><div><div style="font-weight:600">'+esc(p.name)+'</div><div style="font-size:11px;color:var(--text-dim)">'+teamName(p.teams)+' &middot; '+p.games+' games</div></div><span style="color:var(--green);font-weight:700;font-size:16px;font-family:\'Playfair Display\',serif">'+p.goals+'</span>';}).join('')}
        </div>
      </div>
      <div class="card"><h3 class="mb-12">${icon('star',18)} MVP Awards</h3>
        <div style="display:grid;grid-template-columns:30px 1fr auto;gap:4px 12px;font-size:13px;align-items:center">
          ${byMVP.slice(0,15).map(function(p,i){return '<span style="color:'+(i<3?'var(--accent)':'var(--text-muted)')+';font-weight:700;text-align:center;font-family:\'Playfair Display\',serif">'+(i+1)+'</span><div><div style="font-weight:600">'+esc(p.name)+'</div><div style="font-size:11px;color:var(--text-dim)">'+teamName(p.teams)+'</div></div><span style="color:var(--accent);font-weight:700">'+p.mvps+' '+icon('star',12)+'</span>';}).join('')}
        </div>
      </div>
    </div>
    ${byGPG.length>0?'<div class="card"><h3 class="mb-12">Goals Per Game (min. 3 games)</h3><div style="display:grid;grid-template-columns:30px 1fr auto auto;gap:4px 16px;font-size:13px;align-items:center">'+byGPG.slice(0,10).map(function(p,i){return '<span style="color:'+(i<3?'var(--accent)':'var(--text-muted)')+';font-weight:700;text-align:center">'+(i+1)+'</span><div><div style="font-weight:600">'+esc(p.name)+'</div><div style="font-size:11px;color:var(--text-dim)">'+teamName(p.teams)+'</div></div><span style="color:var(--text-muted);font-size:12px">'+p.goals+'g / '+p.games+'gp</span><span style="color:var(--blue);font-weight:700;font-size:16px;font-family:\'Playfair Display\',serif">'+(p.goals/p.games).toFixed(2)+'</span>';}).join('')+'</div></div>':''}
  `;
}

    '<div class="flex gap-16 mb-20">'+
    '<label class="flex gap-8" style="cursor:pointer;font-size:14px"><input type="checkbox" id="ev-arena"'+(v.hasArena?' checked':'')+' > Indoor Arena</label>'+
    '<label class="flex gap-8" style="cursor:pointer;font-size:14px"><input type="checkbox" id="ev-outdoor"'+(v.hasOutdoor?' checked':'')+' > Outdoor</label>'+
    '<label class="flex gap-8" style="cursor:pointer;font-size:14px"><input type="checkbox" id="ev-oa"'+(v.hasOutdoorArena?' checked':'')+' > Outdoor Arena</label></div>'+
    '<div class="flex gap-8"><button class="btn btn-primary" onclick="saveEditVenue(&apos;'+v.id+'&apos;)">'+icon('check')+' Save</button><button class="btn btn-secondary" onclick="closeEditVenue()">Cancel</button></div>'+
  '</div></div>';
}
function saveEditVenue(vid){
  var v=state.venues.find(function(v){return v.id===vid;});if(!v)return;
  v.name=document.getElementById('ev-name').value;
  v.location=document.getElementById('ev-loc').value;
  v.st=document.getElementById('ev-st').value;
  v.organizer=document.getElementById('ev-org').value;
  v.contact=document.getElementById('ev-email').value;
  v.notes=document.getElementById('ev-notes').value;
  v.hasArena=document.getElementById('ev-arena').checked;
  v.hasOutdoor=document.getElementById('ev-outdoor').checked;
  v.hasOutdoorArena=document.getElementById('ev-oa').checked;
  v.logo=state._editVenueLogo||v.logo;
  state.editVenueModal=null;save();render();
}



function seasonBar(){return '';}


// ═══ RESOURCES PAGE ═══
function renderResourcesPage(tm,vm){
  const upcoming=[];
  state.schedule.forEach(function(w){w.games.forEach(function(g){
    if(!state.results[g.id])upcoming.push({...g,weekNum:w.week,month:w.month,weekDate:w.date});
  });});
  const filled=[];
  state.schedule.forEach(function(w){w.games.forEach(function(g){
    if(state.results[g.id])filled.push({...g,weekNum:w.week,month:w.month});
  });});

  return '<div class="flex between mb-24"><div><h2>Game Day Resources</h2><p style="color:var(--text-muted);font-size:14px;margin-top:4px">Sign up to umpire, provide horses, or volunteer for game-day roles.</p></div></div>'+
    '<div class="grid-3 mb-24">'+
    countResourceStats(upcoming)+
    '</div>'+
    (upcoming.length>0?
      '<h3 style="color:var(--accent);margin-bottom:12px">Upcoming Games — Resource Needs</h3>'+
      upcoming.slice(0,12).map(function(g){
        var ht=tm[g.home],at=tm[g.away],v=vm[g.venue];
        var res=state.resources[g.id]||{slots:{}};
        var filledCount=0,totalReq=0;
        RESOURCE_TYPES.forEach(function(rt){if(rt.required){totalReq++;if(res.slots[rt.id]&&res.slots[rt.id].filled)filledCount++;}});
        var urgent=totalReq>0&&filledCount<totalReq;
        return '<div class="resource-card"><div class="flex between mb-8">'+
          '<div><span style="font-weight:600;font-size:14px">'+(ht?esc(ht.name):'?')+' vs '+(at?esc(at.name):'?')+'</span><div style="font-size:11px;color:var(--text-dim)">'+g.date+' &middot; '+(g.time||'TBD')+' &middot; '+(v?esc(v.name):'TBD')+'</div></div>'+
          '<div class="flex gap-8"><span class="resource-badge '+(urgent?'rb-urgent':'rb-filled')+'">'+filledCount+'/'+totalReq+' required filled</span>'+
          '<button class="btn btn-secondary btn-sm" onclick="openResourceModal(&apos;'+g.id+'&apos;)">Manage</button></div></div>'+
          '<div class="flex gap-8 wrap">'+RESOURCE_TYPES.map(function(rt){
            var slot=res.slots[rt.id]||{};
            return '<span class="resource-badge '+(slot.filled?'rb-filled':'rb-open')+'">'+rt.icon+' '+(slot.filled?esc(slot.volunteer||'Filled'):'Open')+'</span>';
          }).join('')+'</div></div>';
      }).join('')+
      (upcoming.length>12?'<div style="text-align:center;padding:12px;color:var(--text-dim);font-size:13px">+ '+(upcoming.length-12)+' more games</div>':'')
    :'<div style="text-align:center;padding:40px;color:var(--text-dim)">All games have been played.</div>');
}

function countResourceStats(upcoming){
  var umpires=0,timekeepers=0,horses=0,total=upcoming.length;
  upcoming.forEach(function(g){
    var res=state.resources[g.id]||{slots:{}};
    if(res.slots['umpire']&&res.slots['umpire'].filled)umpires++;
    if(res.slots['timekeeper']&&res.slots['timekeeper'].filled)timekeepers++;
    if(res.slots['umpire-horse']&&res.slots['umpire-horse'].filled)horses++;
  });
  return [{l:'Umpires Filled',v:umpires+'/'+total,c:'var(--green)'},{l:'Timekeepers',v:timekeepers+'/'+total,c:'var(--blue)'},{l:'Umpire Horses',v:horses+'/'+total,c:'var(--accent)'}].map(function(s){
    return '<div class="card center"><div style="font-family:\'Playfair Display\',serif;font-size:28px;font-weight:700;color:'+s.c+'">'+s.v+'</div><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-top:4px">'+s.l+'</div></div>';
  }).join('');
}

function openResourceModal(gid){state.resourceModal=gid;render();}
function closeResourceModal(){state.resourceModal=null;render();}

function renderResourceModal(tm,vm){
  var game=null;
  for(var w of state.schedule){var f=w.games.find(function(g){return g.id===state.resourceModal;});if(f){game=f;break;}}
  if(!game)return'';
  var ht=tm[game.home],at=tm[game.away],v=vm[game.venue];
  var res=state.resources[game.id]||{gameId:game.id,slots:{}};

  return '<div class="modal-overlay" onclick="if(event.target===this)closeResourceModal()"><div class="modal fade-in" style="max-width:620px">'+
    '<button class="modal-close" onclick="closeResourceModal()">'+icon('x',20)+'</button>'+
    '<div style="text-align:center;margin-bottom:20px"><h3>Game Day Resources</h3>'+
    '<div style="font-size:14px;margin-top:6px">'+(ht?esc(ht.name):'?')+' vs '+(at?esc(at.name):'?')+'</div>'+
    '<div style="font-size:12px;color:var(--text-dim)">'+game.date+' &middot; '+(game.time||'TBD')+(v?' &middot; '+esc(v.name):'')+'</div></div>'+
    RESOURCE_TYPES.map(function(rt){
      var slot=res.slots[rt.id]||{};
      return '<div class="resource-slot"><div class="flex gap-8"><span style="font-size:18px">'+rt.icon+'</span><div><div style="font-weight:600;font-size:14px">'+rt.name+(rt.required?' <span style="color:var(--red);font-size:11px">REQUIRED</span>':'')+'</div>'+
        (slot.filled?'<div style="font-size:12px;color:var(--green)">'+esc(slot.volunteer||'')+( slot.horseName?' — '+esc(slot.horseName):'')+(slot.confirmed?' ✓ Confirmed':'')+'</div>':'<div style="font-size:12px;color:var(--text-dim)">Open — needs volunteer</div>')+
        '</div></div>'+
        (slot.filled?
          '<button class="btn btn-danger btn-sm" onclick="clearResource(&apos;'+game.id+'&apos;,&apos;'+rt.id+'&apos;)">Clear</button>'
          :'<button class="btn btn-secondary btn-sm" onclick="fillResource(&apos;'+game.id+'&apos;,&apos;'+rt.id+'&apos;)">Sign Up</button>')+
        '</div>';
    }).join('')+
    '<div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">'+
    '<h4 style="margin-bottom:8px;color:var(--accent)">🐎 Spare Horses Available</h4>'+
    '<div style="font-size:13px;color:var(--text-muted);margin-bottom:8px">List a horse available for visiting players at this game.</div>'+
    '<div class="flex gap-8"><input id="rm-spare-name" placeholder="Horse name" style="flex:1"><input id="rm-spare-owner" placeholder="Owner" style="flex:1"><input id="rm-spare-terms" placeholder="Free / Fee / Reciprocal" style="flex:1"><button class="btn btn-secondary btn-sm" onclick="addSpareHorse(&apos;'+game.id+'&apos;)">Add</button></div>'+
    (res.spareHorses&&res.spareHorses.length>0?res.spareHorses.map(function(h,i){
      return '<div class="resource-slot"><div><span style="font-weight:600">🐎 '+esc(h.name)+'</span> <span style="color:var(--text-muted)">— '+esc(h.owner)+'</span> <span style="font-size:11px;color:var(--text-dim)">('+esc(h.terms)+')</span></div><button class="btn-icon" onclick="rmSpareHorse(&apos;'+game.id+'&apos;,'+i+')">&times;</button></div>';
    }).join(''):'<div style="font-size:12px;color:var(--text-dim);padding:8px 0">No spare horses listed yet.</div>')+
    '</div>'+
    '<div style="margin-top:16px;text-align:right"><button class="btn btn-primary" onclick="closeResourceModal()">Done</button></div>'+
  '</div></div>';
}

function fillResource(gid,rtid){
  var name=prompt('Your name (volunteer):');if(!name)return;
  if(!state.resources[gid])state.resources[gid]={gameId:gid,slots:{},spareHorses:[]};
  var slot={filled:true,volunteer:name,confirmed:false};
  if(rtid==='umpire-horse'){var hname=prompt('Horse name:');slot.horseName=hname||'';}
  state.resources[gid].slots[rtid]=slot;
  save();render();
}
function clearResource(gid,rtid){
  if(!state.resources[gid])return;
  state.resources[gid].slots[rtid]={filled:false};
  save();render();
}
function addSpareHorse(gid){
  var n=document.getElementById('rm-spare-name').value;
  var o=document.getElementById('rm-spare-owner').value;
  var t=document.getElementById('rm-spare-terms').value||'TBD';
  if(!n||!o){alert('Enter horse name and owner.');return;}
  if(!state.resources[gid])state.resources[gid]={gameId:gid,slots:{},spareHorses:[]};
  if(!state.resources[gid].spareHorses)state.resources[gid].spareHorses=[];
  state.resources[gid].spareHorses.push({name:n,owner:o,terms:t});
  save();render();
}
function rmSpareHorse(gid,i){
  if(state.resources[gid]&&state.resources[gid].spareHorses){
    state.resources[gid].spareHorses.splice(i,1);save();render();
  }
}

// ═══ INIT ═══
initState();
render();
</script>
</body>
</html>
