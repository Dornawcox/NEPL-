<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEPL — New England Polo League</title>
<meta name="description" content="New England Polo League — Club team polo across New England. Register teams, schedule games, track standings.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0C1117;
  --surface: #151C25;
  --surface-alt: #1A2332;
  --border: #253040;
  --border-light: #2D3B4F;
  --text: #E8ECF1;
  --text-muted: #8896A8;
  --text-dim: #5A6A7E;
  --accent: #C4A25C;
  --accent-light: #D4B76C;
  --accent-dark: #A48840;
  --green: #4CAF6E;
  --red: #CF6056;
  --blue: #5B8DC9;
  --teal: #4CA89E;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
}
.serif { font-family: 'Playfair Display', serif; }
a { color: var(--accent); text-decoration: none; }

/* Layout */
.max-w { max-width: 1120px; margin: 0 auto; padding: 0 24px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
.card-accent { border-color: rgba(196,162,92,0.3); }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.flex { display: flex; align-items: center; }
.gap-8 { gap: 8px; }
.gap-12 { gap: 12px; }
.gap-16 { gap: 16px; }
.between { justify-content: space-between; }
.center { text-align: center; }
.mt-4 { margin-top: 4px; }
.mt-8 { margin-top: 8px; }
.mt-12 { margin-top: 12px; }
.mt-16 { margin-top: 16px; }
.mt-24 { margin-top: 24px; }
.mt-28 { margin-top: 28px; }
.mb-6 { margin-bottom: 6px; }
.mb-10 { margin-bottom: 10px; }
.mb-12 { margin-bottom: 12px; }
.mb-16 { margin-bottom: 16px; }
.mb-20 { margin-bottom: 20px; }
.mb-24 { margin-bottom: 24px; }
.mb-32 { margin-bottom: 32px; }

/* Typography */
h1 { font-family: 'Playfair Display', serif; font-size: 42px; font-weight: 700; letter-spacing: -0.02em; }
h2 { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; }
h3 { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--accent); }
.stat-num { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 700; }
.stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; }

/* Inputs */
label.field-label {
  display: block; font-size: 12px; font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px;
}
input, select, textarea {
  width: 100%; padding: 10px 14px; background: var(--surface-alt); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none;
}
input:focus, select:focus { border-color: var(--accent); }
input.score-input { width: 48px; text-align: center; padding: 8px 4px; font-size: 16px; font-weight: 700; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border: none; border-radius: 6px;
  font-weight: 600; font-size: 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s;
}
.btn-primary { background: var(--accent); color: var(--bg); }
.btn-primary:hover { background: var(--accent-light); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-secondary { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
.btn-secondary:hover { background: rgba(196,162,92,0.1); }
.btn-danger { background: transparent; color: var(--red); border: 1px solid rgba(207,96,86,0.4); }
.btn-sm { padding: 6px 14px; font-size: 12px; }
.btn-xs { padding: 4px 10px; font-size: 11px; }
.btn-icon { background: none; border: none; color: var(--text-dim); cursor: pointer; padding: 4px; display: inline-flex; }
.btn-icon:hover { color: var(--text); }

/* Tags */
.tag {
  display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; letter-spacing: 0.03em;
}
.tag-low { background: rgba(76,168,158,0.1); color: var(--teal); }
.tag-med { background: rgba(91,141,201,0.1); color: var(--blue); }
.tag-arena { background: rgba(91,141,201,0.1); color: var(--blue); }
.tag-outdoor { background: rgba(76,175,110,0.1); color: var(--green); }
.tag-indoor { background: rgba(91,141,201,0.1); color: var(--blue); }
.tag-win { background: rgba(76,175,110,0.12); color: var(--green); }
.tag-loss { background: rgba(207,96,86,0.12); color: var(--red); }
.tag-draw { background: rgba(137,150,168,0.12); color: var(--text-muted); }

/* Header */
header { border-bottom: 1px solid var(--border); background: var(--surface); }
.header-inner { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; }
.logo-area { display: flex; align-items: center; gap: 14px; }
.logo-icon { color: var(--accent); }
.logo-icon svg { width: 28px; height: 28px; }
.logo-text { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; }
.logo-sub { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.12em; margin-top: -2px; }
nav { display: flex; gap: 2px; background: var(--surface-alt); border-radius: 8px; padding: 3px; }
nav button {
  display: flex; align-items: center; gap: 6px; padding: 8px 14px; border: none; border-radius: 6px;
  cursor: pointer; background: transparent; color: var(--text-muted); font-size: 13px; font-weight: 600;
  font-family: 'DM Sans', sans-serif; transition: all 0.15s;
}
nav button.active { background: rgba(196,162,92,0.15); color: var(--accent); }
nav button:hover:not(.active) { color: var(--text); }
nav button svg { width: 16px; height: 16px; }

/* Table */
.league-table { width: 100%; border-collapse: collapse; font-size: 14px; }
.league-table th {
  padding: 12px 10px; text-align: center; font-size: 11px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); font-weight: 600;
}
.league-table th.left { text-align: left; }
.league-table td { padding: 10px; text-align: center; border-bottom: 1px solid var(--border); }
.league-table td.left { text-align: left; }
.league-table tr:nth-child(even) { background: rgba(26,35,50,0.3); }
.league-table .rank { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; }
.league-table .pts-cell { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; color: var(--accent); }

/* Game card */
.game-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px;
  display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: center; cursor: pointer;
  transition: border-color 0.15s;
}
.game-card:hover { border-color: var(--border-light); }
.game-card.has-result { border-left: 3px solid var(--accent); }
.game-team { font-weight: 600; font-size: 14px; }
.game-club { font-size: 11px; color: var(--text-dim); }
.game-venue { font-size: 11px; color: var(--text-dim); margin-top: 6px; }
.game-score { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--accent); }
.game-vs { font-size: 12px; color: var(--text-dim); font-weight: 600; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center;
  justify-content: center; z-index: 1000; padding: 20px; backdrop-filter: blur(4px);
}
.modal {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  width: 100%; max-width: 520px; padding: 28px; position: relative;
}
.modal-close {
  position: absolute; top: 14px; right: 14px; background: none; border: none; color: var(--text-dim);
  cursor: pointer; padding: 4px;
}
.modal-close:hover { color: var(--text); }

/* Results detail */
.result-row {
  display: grid; grid-template-columns: 1fr auto 1fr; gap: 16px; align-items: center; padding: 14px 0;
  border-bottom: 1px solid var(--border);
}
.result-row:last-child { border-bottom: none; }

/* Footer */
footer { border-top: 1px solid var(--border); padding: 24px; text-align: center; margin-top: 40px; }
footer .sub { font-size: 12px; color: var(--text-dim); }

/* Empty state */
.empty { text-align: center; padding: 60px 20px; color: var(--text-dim); }
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-title { font-size: 16px; }
.empty-sub { font-size: 13px; margin-top: 4px; }

/* Month filter pills */
.filter-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
.pill {
  padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer;
  background: transparent; color: var(--accent); border: 1px solid var(--accent); font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
}
.pill.active { background: rgba(196,162,92,0.15); }

/* Responsive */
@media (max-width: 768px) {
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  nav { flex-wrap: wrap; }
  nav button span { display: none; }
  h1 { font-size: 28px; }
  .header-inner { flex-direction: column; gap: 12px; }
  .game-card { grid-template-columns: 1fr; text-align: center; gap: 8px; }
}

/* Week header */
.week-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.week-label { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; color: var(--accent); }
.week-month { font-size: 13px; color: var(--text-muted); }

/* How it works grid */
.how-card { padding: 16px; background: var(--surface-alt); border-radius: 8px; }
.how-title { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
.how-desc { font-size: 13px; color: var(--text-muted); line-height: 1.55; }

/* Recent results */
.recent-result {
  display: flex; justify-content: space-between; align-items: center; padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.recent-result:last-child { border-bottom: none; }

/* Chukker scores */
.chukker-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.chukker-label { font-size: 12px; color: var(--text-muted); min-width: 70px; }
.chukker-input { width: 48px; text-align: center; padding: 6px 4px; }

/* Transitions */
.fade-in { animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// NEPL — New England Polo League — Standalone App
// ═══════════════════════════════════════════════════════════════

const LS = {
  get(k) { try { const v = localStorage.getItem('nepl-' + k); return v ? JSON.parse(v) : null; } catch { return null; } },
  set(k, v) { try { localStorage.setItem('nepl-' + k, JSON.stringify(v)); } catch(e) { console.error(e); } },
  clear() { ['teams','venues','schedule','results'].forEach(k => localStorage.removeItem('nepl-' + k)); }
};

// ── State ──
let state = {
  tab: 'home',
  teams: LS.get('teams') || [],
  venues: LS.get('venues') || [],
  schedule: LS.get('schedule') || [],
  results: LS.get('results') || {},
  showTeamForm: false,
  showVenueForm: false,
  gameModal: null,       // game id for detail modal
  filterMonth: 'all',
  teamForm: freshTeamForm(),
  venueForm: freshVenueForm(),
};

function freshTeamForm() {
  return { name:'', club:'', goalLevel:'low', homeVenue:'',
    p1:'', p1h:'', p2:'', p2h:'', p3:'', p3h:'', a1:'', a1h:'', a2:'', a2h:'' };
}
function freshVenueForm() {
  return { name:'', location:'', st:'MA', hasArena:true, hasOutdoor:true, contact:'', notes:'' };
}

function save() {
  LS.set('teams', state.teams);
  LS.set('venues', state.venues);
  LS.set('schedule', state.schedule);
  LS.set('results', state.results);
}

function setState(patch) {
  Object.assign(state, patch);
  save();
  render();
}

// ── Helpers ──
function teamMap() { const m = {}; state.teams.forEach(t => m[t.id] = t); return m; }
function venueMap() { const m = {}; state.venues.forEach(v => m[v.id] = v); return m; }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ── Schedule Algorithm ──
function generateSchedule() {
  const teams = state.teams;
  const venues = state.venues;
  if (teams.length < 2) return [];

  const matchups = [];
  for (let i = 0; i < teams.length; i++) {
    for (let j = i + 1; j < teams.length; j++) {
      matchups.push({ home: teams[i].id, away: teams[j].id });
      matchups.push({ home: teams[j].id, away: teams[i].id });
    }
  }
  // Shuffle
  for (let i = matchups.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [matchups[i], matchups[j]] = [matchups[j], matchups[i]];
  }

  const months = [
    { month:'April', indoor:true, weeks:3 },
    { month:'May', indoor:false, weeks:4 },
    { month:'June', indoor:false, weeks:4 },
    { month:'July', indoor:false, weeks:3 },
    { month:'August', indoor:false, weeks:4 },
    { month:'September', indoor:false, weeks:4 },
    { month:'October', indoor:false, weeks:3 },
    { month:'November', indoor:true, weeks:3 },
    { month:'December', indoor:true, weeks:2 },
  ];

  const tvMap = {};
  teams.forEach(t => { if (t.homeVenue) tvMap[t.id] = t.homeVenue; });
  const arenaV = venues.filter(v => v.hasArena).map(v => v.id);
  const outdoorV = venues.filter(v => v.hasOutdoor).map(v => v.id);

  const schedule = [];
  let mIdx = 0, weekNum = 1;
  const gamesPerWeek = Math.max(1, Math.floor(teams.length / 2));

  for (const block of months) {
    for (let w = 0; w < block.weeks && mIdx < matchups.length; w++) {
      const weekGames = [];
      const used = new Set();
      let attempts = 0;
      for (let g = 0; g < gamesPerWeek && mIdx < matchups.length && attempts < matchups.length; ) {
        const match = matchups[mIdx];
        if (!used.has(match.home) && !used.has(match.away)) {
          let vid = tvMap[match.home] || null;
          if (block.indoor && vid) {
            const v = venues.find(vn => vn.id === vid);
            if (v && !v.hasArena) vid = arenaV.length > 0 ? arenaV[g % arenaV.length] : vid;
          }
          if (!vid) {
            const pool = block.indoor ? arenaV : outdoorV;
            vid = pool.length > 0 ? pool[g % pool.length] : null;
          }
          weekGames.push({
            id: 'g-' + weekNum + '-' + g,
            home: match.home, away: match.away,
            venue: vid, week: weekNum, month: block.month, indoor: block.indoor,
          });
          used.add(match.home);
          used.add(match.away);
          mIdx++;
          g++;
          attempts = 0;
        } else {
          matchups.push(matchups.splice(mIdx, 1)[0]);
          attempts++;
          if (mIdx >= matchups.length) break;
        }
      }
      if (weekGames.length > 0) {
        schedule.push({ week: weekNum, month: block.month, indoor: block.indoor, games: weekGames });
        weekNum++;
      }
    }
  }
  return schedule;
}

// ── Standings ──
function calcStandings() {
  const stats = {};
  state.teams.forEach(t => {
    stats[t.id] = { id:t.id, name:t.name, club:t.club, w:0, l:0, d:0, pts:0, gf:0, ga:0, played:0, form:[] };
  });
  // Process results in schedule order
  state.schedule.forEach(week => {
    week.games.forEach(game => {
      const r = state.results[game.id];
      if (!r || !stats[r.home] || !stats[r.away]) return;
      const hs = r.homeScore, as = r.awayScore;
      stats[r.home].gf += hs; stats[r.home].ga += as;
      stats[r.away].gf += as; stats[r.away].ga += hs;
      stats[r.home].played++; stats[r.away].played++;
      if (hs > as) {
        stats[r.home].w++; stats[r.home].pts += 3; stats[r.away].l++;
        stats[r.home].form.push('W'); stats[r.away].form.push('L');
      } else if (as > hs) {
        stats[r.away].w++; stats[r.away].pts += 3; stats[r.home].l++;
        stats[r.away].form.push('W'); stats[r.home].form.push('L');
      } else {
        stats[r.home].d++; stats[r.away].d++;
        stats[r.home].pts += 1; stats[r.away].pts += 1;
        stats[r.home].form.push('D'); stats[r.away].form.push('D');
      }
    });
  });
  return Object.values(stats).sort((a,b) => b.pts - a.pts || (b.gf-b.ga)-(a.gf-a.ga) || b.gf - a.gf);
}

// ═══ SVG Icons ═══
const ICO = {
  horse: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L18 6H13L8 11V16L3 21"/><path d="M13 6V2L18 6"/><path d="M8 11L3 6"/></svg>`,
  plus: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5V19M5 12H19"/></svg>`,
  calendar: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2V6M8 2V6M3 10H21"/></svg>`,
  trophy: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M6 9H4C3 9 2 8 2 7V6C2 5 3 4 4 4H6M18 9H20C21 9 22 8 22 7V6C22 5 21 4 20 4H18"/><path d="M6 4H18V9C18 13 15 16 12 16C9 16 6 13 6 9V4Z"/><path d="M12 16V19M8 22H16M8 22V19H16V22"/></svg>`,
  map: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M1 6V22L8 18L16 22L23 18V2L16 6L8 2L1 6Z"/><path d="M8 2V18M16 6V22"/></svg>`,
  users: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M17 21V19C17 16.8 15.2 15 13 15H5C2.8 15 1 16.8 1 19V21"/><circle cx="9" cy="7" r="4"/><path d="M23 21V19C23 17.1 21.8 15.5 20 15M16 3.1C17.8 3.6 19 5.2 19 7C19 8.8 17.8 10.4 16 10.9"/></svg>`,
  x: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6L18 18"/></svg>`,
  refresh: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 4V10H7"/><path d="M23 20V14H17"/><path d="M20.5 9A9 9 0 0 0 5.6 5.6L1 10M23 14L18.4 18.4A9 9 0 0 1 3.5 15"/></svg>`,
  edit: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
  check: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M20 6L9 17L4 12"/></svg>`,
  bar: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M18 20V10M12 20V4M6 20V14"/></svg>`,
};
function icon(name, size=16) {
  return `<span style="display:inline-flex;width:${size}px;height:${size}px">${ICO[name]}</span>`;
}

// ═══ Render ═══
function render() {
  const app = document.getElementById('app');
  const tm = teamMap();
  const vm = venueMap();

  app.innerHTML = `
    <header>
      <div class="max-w">
        <div class="header-inner">
          <div class="logo-area">
            <div class="logo-icon">${icon('horse', 28)}</div>
            <div>
              <div class="logo-text">NEPL</div>
              <div class="logo-sub">New England Polo League</div>
            </div>
          </div>
          <nav>
            ${['home','teams','venues','schedule','results','standings'].map(t => `
              <button class="${state.tab===t?'active':''}" onclick="setState({tab:'${t}'})">${icon(
                t==='home'?'trophy':t==='teams'?'users':t==='venues'?'map':t==='schedule'?'calendar':t==='results'?'edit':t==='standings'?'bar':'trophy'
              )} <span>${t[0].toUpperCase()+t.slice(1)}</span></button>
            `).join('')}
          </nav>
        </div>
      </div>
    </header>
    <main class="max-w" style="padding-top:28px;padding-bottom:40px">
      ${state.tab==='home'    ? renderHome(tm, vm) :
        state.tab==='teams'   ? renderTeams(tm, vm) :
        state.tab==='venues'  ? renderVenues(vm) :
        state.tab==='schedule'? renderSchedule(tm, vm) :
        state.tab==='results' ? renderResults(tm, vm) :
        state.tab==='standings'? renderStandings(tm) : ''}
    </main>
    <footer>
      <div class="sub">NEPL &mdash; New England Polo League &mdash; Season 2027</div>
      <button class="btn btn-danger btn-xs mt-8" onclick="resetAll()">Reset All Data</button>
    </footer>
    ${state.gameModal ? renderGameModal(tm, vm) : ''}
  `;
}

function resetAll() {
  if (confirm('Reset all league data? This cannot be undone.')) {
    LS.clear();
    state.teams = []; state.venues = []; state.schedule = []; state.results = {};
    state.showTeamForm = false; state.showVenueForm = false; state.gameModal = null;
    render();
  }
}

function submitTeam() {
  const f = state.teamForm;
  if (!f.name || !f.club || !f.p1 || !f.p2 || !f.p3) { alert('Please fill in team name, club, and all 3 players.'); return; }
  const team = {
    id: 'team-' + Date.now(),
    name: f.name, club: f.club, goalLevel: f.goalLevel, homeVenue: f.homeVenue,
    players: [{name:f.p1,handicap:f.p1h},{name:f.p2,handicap:f.p2h},{name:f.p3,handicap:f.p3h}].filter(p=>p.name),
    alternates: [{name:f.a1,handicap:f.a1h},{name:f.a2,handicap:f.a2h}].filter(a=>a.name),
  };
  state.teams.push(team);
  state.teamForm = freshTeamForm();
  state.showTeamForm = false;
  save(); render();
}

function removeTeam(id) {
  if (!confirm('Remove this team?')) return;
  state.teams = state.teams.filter(t => t.id !== id);
  save(); render();
}

function removeVenue(id) {

// ═══ SCHEDULE ═══
function renderSchedule(tm, vm) {
  const months = [...new Set(state.schedule.map(w => w.month))];
  const filtered = state.filterMonth === 'all' ? state.schedule : state.schedule.filter(w => w.month === state.filterMonth);
  const totalGames = state.schedule.reduce((s,w) => s + w.games.length, 0);

  return `
    <div class="flex between mb-24">
      <div>
        <h2>Season Schedule</h2>
        <p style="color:var(--text-muted);font-size:14px" class="mt-4">
          ${state.schedule.length > 0 ? state.schedule.length+' weeks, '+totalGames+' matches' : 'Generate a schedule from registered teams and venues'}
        </p>
      </div>
      <button class="btn btn-primary" onclick="doGenerate()" ${state.teams.length<2||state.venues.length<1?'disabled':''}>${icon('refresh')} ${state.schedule.length>0?'Regenerate':'Generate Schedule'}</button>
    </div>

    ${state.teams.length < 2 ? `<div class="card card-accent center" style="padding:40px"><div style="color:var(--text-muted);font-size:15px">Register at least 2 teams and 1 venue to generate a schedule.</div></div>` : ''}

    ${state.schedule.length > 0 ? `
      <div class="filter-pills">
        <button class="pill ${state.filterMonth==='all'?'active':''}" onclick="setState({filterMonth:'all'})">All</button>
        ${months.map(m => `<button class="pill ${state.filterMonth===m?'active':''}" onclick="setState({filterMonth:'${m}'})">${m}</button>`).join('')}
      </div>
      ${filtered.map(week => `
        <div class="mb-20 fade-in">
          <div class="week-header">
            <span class="week-label">Week ${week.week}</span>
            <span class="week-month">${week.month}</span>
            <span class="tag ${week.indoor?'tag-indoor':'tag-outdoor'}">${week.indoor?'Indoor':'Outdoor'}</span>
          </div>
          <div style="display:grid;gap:8px">
            ${week.games.map(g => {
              const ht = tm[g.home], at = tm[g.away], v = vm[g.venue];
              const r = state.results[g.id];
              return `
                <div class="game-card ${r?'has-result':''}" onclick="openGameModal('${g.id}')">
                  <div style="text-align:right">
                    <div class="game-team">${ht?esc(ht.name):'?'}</div>
                    <div class="game-club">${ht?esc(ht.club):''}</div>
                  </div>
                  <div class="center">
                    ${r ? `<div class="game-score">${r.homeScore} – ${r.awayScore}</div>` : `<div class="game-vs">vs</div>`}
                    ${v ? `<div class="game-venue">@ ${esc(v.name)}</div>` : ''}
                  </div>
                  <div>
                    <div class="game-team">${at?esc(at.name):'?'}</div>
                    <div class="game-club">${at?esc(at.club):''}</div>
                  </div>
                </div>`;
            }).join('')}
          </div>
        </div>
      `).join('')}
    ` : ''}
  `;
}

function doGenerate() {
  if (state.schedule.length > 0 && !confirm('Regenerate the schedule? This will clear existing results.')) return;
  state.schedule = generateSchedule();
  state.results = {};
  save(); render();
}

// ═══ RESULTS (dedicated page) ═══
function renderResults(tm, vm) {
  const gamesWithResults = [];
  const gamesWithout = [];
  state.schedule.forEach(week => {
    week.games.forEach(g => {
      const obj = { ...g, weekNum: week.week, month: week.month, indoor: week.indoor };
      if (state.results[g.id]) gamesWithResults.push(obj); else gamesWithout.push(obj);
    });
  });

  return `
    <div class="flex between mb-24">
      <div>
        <h2>Enter Results</h2>
        <p style="color:var(--text-muted);font-size:14px" class="mt-4">
          ${gamesWithResults.length} of ${gamesWithResults.length + gamesWithout.length} games completed.
          Click any game to enter or edit the score.
        </p>
      </div>
    </div>

    ${state.schedule.length === 0 ? `<div class="card card-accent center" style="padding:40px"><div style="color:var(--text-muted);font-size:15px">Generate a schedule first to enter results.</div></div>` : ''}

    ${gamesWithout.length > 0 ? `
      <h3 class="mb-12">Upcoming / Unplayed</h3>
      <div style="display:grid;gap:8px" class="mb-32">
        ${gamesWithout.slice(0, 20).map(g => {
          const ht = tm[g.home], at = tm[g.away], v = vm[g.venue];
          return `
            <div class="game-card" onclick="openGameModal('${g.id}')">
              <div style="text-align:right"><div class="game-team">${ht?esc(ht.name):'?'}</div><div class="game-club">${ht?esc(ht.club):''}</div></div>
              <div class="center">
                <div class="game-vs">vs</div>
                <div class="game-venue">Wk ${g.weekNum} &middot; ${g.month}${v?' &middot; @ '+esc(v.name):''}</div>
              </div>
              <div><div class="game-team">${at?esc(at.name):'?'}</div><div class="game-club">${at?esc(at.club):''}</div></div>
            </div>`;
        }).join('')}
        ${gamesWithout.length > 20 ? `<div class="center" style="padding:10px;color:var(--text-dim);font-size:13px">+ ${gamesWithout.length - 20} more games</div>` : ''}
      </div>
    ` : ''}

    ${gamesWithResults.length > 0 ? `
      <h3 class="mb-12">Completed Games</h3>
      <div style="display:grid;gap:8px">
        ${gamesWithResults.map(g => {
          const ht = tm[g.home], at = tm[g.away], v = vm[g.venue], r = state.results[g.id];
          return `
            <div class="game-card has-result" onclick="openGameModal('${g.id}')">
              <div style="text-align:right"><div class="game-team">${ht?esc(ht.name):'?'}</div><div class="game-club">${ht?esc(ht.club):''}</div></div>
              <div class="center">
                <div class="game-score">${r.homeScore} – ${r.awayScore}</div>
                <div class="game-venue">Wk ${g.weekNum} &middot; ${g.month}${v?' &middot; @ '+esc(v.name):''}</div>
              </div>
              <div><div class="game-team">${at?esc(at.name):'?'}</div><div class="game-club">${at?esc(at.club):''}</div></div>
            </div>`;
        }).join('')}
      </div>
    ` : ''}
  `;
}

// ═══ GAME MODAL ═══
function openGameModal(gameId) {
  state.gameModal = gameId;
  render();
}

function closeGameModal() {
  state.gameModal = null;
  render();
}

  if (!game) return '';

  return `

          </div>

            <div style="font-size:12px;color:var(--text-muted);margin-top:2px">${ht?esc(ht.club):''}</div>
            <span class="tag ${ht&&ht.goalLevel==='low'?'tag-low':'tag-med'}" style="margin-top:6px">${ht?ht.goalLevel==='low'?'Low':'Med':''}</span>
            ${ht ? `<div style="margin-top:10px;font-size:12px;color:var(--text-dim)">${ht.players.map(p=>esc(p.name)).join('<br>')}</div>` : ''}
          </div>
          <div class="center">
            <div style="font-size:12px;color:var(--text-dim);margin-bottom:8px">FINAL SCORE</div>
            <div class="flex gap-8" style="justify-content:center">
              <input type="number" min="0" max="99" class="score-input" id="modal-hs" value="${r.homeScore}" placeholder="–" style="font-size:28px;width:60px;padding:10px 6px">
              <span style="color:var(--text-dim);font-size:24px;font-weight:700;padding:0 4px">–</span>
              <input type="number" min="0" max="99" class="score-input" id="modal-as" value="${r.awayScore}" placeholder="–" style="font-size:28px;width:60px;padding:10px 6px">
            </div>
          </div>
          <div class="center">
            <div class="serif" style="font-size:20px;font-weight:700">${at?esc(at.name):'?'}</div>
            <div style="font-size:12px;color:var(--text-muted);margin-top:2px">${at?esc(at.club):''}</div>

            ${at ? `<div style="margin-top:10px;font-size:12px;color:var(--text-dim)">${at.players.map(p=>esc(p.name)).join('<br>')}</div>` : ''}
          </div>
        </div>

        <div class="mb-16">
          <label class="field-label">Chukker-by-Chukker (optional)</label>
          <div id="chukker-rows">
            ${[1,2,3,4].map(c => {
              const ck = (r.chukkers && r.chukkers[c-1]) || {h:'',a:''};
              return `
                <div class="chukker-row">
                  <span class="chukker-label">Chukker ${c}</span>
                  <input type="number" min="0" max="20" class="chukker-input" id="ck-h-${c}" value="${ck.h}" placeholder="H">
                  <span style="color:var(--text-dim)">–</span>
                  <input type="number" min="0" max="20" class="chukker-input" id="ck-a-${c}" value="${ck.a}" placeholder="A">
                </div>`;
            }).join('')}
          </div>
        </div>

        <div class="mb-20">
          <label class="field-label">Game Notes</label>
          <input id="modal-notes" value="${esc(r.notes||'')}" placeholder="MVP, notable plays, weather conditions...">
        </div>

        <div class="flex gap-8">
          <button class="btn btn-primary" onclick="saveGameResult('${game.id}','${game.home}','${game.away}')">${icon('check')} Save Result</button>
          ${state.results[game.id] ? `<button class="btn btn-danger btn-sm" onclick="clearGameResult('${game.id}')">Clear Result</button>` : ''}
          <button class="btn btn-secondary" onclick="closeGameModal()">Cancel</button>
        </div>
      </div>
    </div>
  `;
}

function saveGameResult(gameId, homeId, awayId) {
  const hs = document.getElementById('modal-hs').value;
  const as = document.getElementById('modal-as').value;
  if (hs === '' || as === '') { alert('Please enter both scores.'); return; }
  const chukkers = [1,2,3,4].map(c => ({
    h: document.getElementById('ck-h-'+c).value, a: document.getElementById('ck-a-'+c).value
  })).filter(c => c.h !== '' || c.a !== '');
  const notes = document.getElementById('modal-notes').value;
  state.results[gameId] = {
    home: homeId, away: awayId,
    homeScore: parseInt(hs), awayScore: parseInt(as),
    chukkers, notes, timestamp: new Date().toISOString()
  };
  state.gameModal = null;
  save(); render();
}

function clearGameResult(gameId) {
  if (!confirm('Clear this result?')) return;
  delete state.results[gameId];
  state.gameModal = null;
  save(); render();
}

// ═══ STANDINGS ═══
function renderStandings(tm) {
  const standings = calcStandings();
  if (standings.length === 0) return `<div class="empty"><div class="empty-title">No teams registered yet</div></div>`;

  const hasResults = standings.some(s => s.played > 0);

  return `
    <div class="mb-24">
      <h2>League Standings</h2>
      <p style="color:var(--text-muted);font-size:14px" class="mt-4">Win = 3 pts &middot; Draw = 1 pt &middot; Loss = 0 pts</p>
    </div>

    <div class="card" style="padding:0;overflow:hidden">
      <table class="league-table">
        <thead><tr>
          <th style="width:40px">#</th>
          <th class="left">Team</th>
          <th class="left">Club</th>
          <th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th><th>Form</th>
        </tr></thead>
        <tbody>
          ${standings.map((s, i) => `
            <tr>
              <td><span class="rank" style="color:${i===0&&s.pts>0?'var(--accent)':'var(--text-muted)'}">${i+1}</span></td>
              <td class="left" style="font-weight:600">${esc(s.name)}</td>
              <td class="left" style="color:var(--text-muted)">${esc(s.club)}</td>
              <td>${s.played}</td>
              <td style="color:var(--green)">${s.w}</td>
              <td style="color:var(--text-muted)">${s.d}</td>
              <td style="color:var(--red)">${s.l}</td>
              <td>${s.gf}</td>
              <td>${s.ga}</td>
              <td style="color:${s.gf-s.ga>0?'var(--green)':s.gf-s.ga<0?'var(--red)':'var(--text-muted)'}">
                ${s.gf-s.ga>0?'+':''}${s.gf-s.ga}
              </td>
              <td class="pts-cell">${s.pts}</td>
              <td>${s.form.slice(-5).map(f => `<span class="tag ${f==='W'?'tag-win':f==='L'?'tag-loss':'tag-draw'}" style="font-size:10px;padding:2px 6px;margin:0 1px">${f}</span>`).join('')}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>

    ${hasResults ? `
      <div class="grid-2 mt-28">
        <div class="card">
          <h3 class="mb-12">Top Scorers</h3>
          ${standings.filter(s=>s.gf>0).sort((a,b)=>b.gf-a.gf).slice(0,5).map((s,i) => `
            <div class="flex between" style="padding:8px 0;border-bottom:1px solid var(--border)">
              <div class="flex gap-12">
                <span style="color:var(--text-muted);font-weight:700;width:20px;text-align:center">${i+1}</span>
                <span style="font-weight:600">${esc(s.name)}</span>
              </div>
              <span style="color:var(--green);font-weight:700">${s.gf} goals</span>
            </div>
          `).join('')}
        </div>
        <div class="card">
          <h3 class="mb-12">Best Defense</h3>
          ${standings.filter(s=>s.played>0).sort((a,b)=>a.ga/a.played-b.ga/b.played).slice(0,5).map((s,i) => `
            <div class="flex between" style="padding:8px 0;border-bottom:1px solid var(--border)">
              <div class="flex gap-12">
                <span style="color:var(--text-muted);font-weight:700;width:20px;text-align:center">${i+1}</span>
                <span style="font-weight:600">${esc(s.name)}</span>
              </div>
              <span style="color:var(--blue);font-weight:700">${(s.ga/s.played).toFixed(1)} GA/game</span>
            </div>
          `).join('')}
        </div>
      </div>
    ` : ''}
  `;
}

// ═══ Init ═══
render();
</script>
</body>
</html>
